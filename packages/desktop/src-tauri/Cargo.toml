[package]
name = "open-calculations-studio"
version = "0.1.3"
description = "Open Calculations Studio - lightweight CalcPAD alternative for Eurocode verifications"
authors = ["OpenAEC Contributors"]
edition = "2021"

[lib]
name = "open_calculations_studio_lib"
crate-type = ["staticlib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["protocol-asset", "image-png"] }
tauri-plugin-opener = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tauri-plugin-store = "2.4.2"
tauri-plugin-os = "2"
tauri-plugin-dialog = "2"
tauri-plugin-fs = "2"

# OpenAEC report engine — local path dep to the openaec-reports workspace.
# Provides ReportData schema + generate_pdf_bytes(&ReportData) -> Vec<u8>.
openaec-core = { path = "../../../../../../../openaec-reports/rust/crates/openaec-core" }

# Release profile — reduce LTO + raise codegen-units so the linker fits in RAM
# on dev machines (LLVM OOM otherwise). Trade-off: slightly bigger binary.
[profile.release]
lto = "thin"
codegen-units = 16
strip = "debuginfo"
