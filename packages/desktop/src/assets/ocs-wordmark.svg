<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 64" width="320" height="64" role="img" aria-label="Open Calculations Studio">
  <!-- Logo block (smaller version of ocs-logo) -->
  <rect x="0" y="8" width="48" height="48" rx="10" fill="#36363E"/>
  <rect x="0" y="8" width="48" height="3" rx="1.5" fill="url(#wmGrad)"/>
  <!-- Mini 2x3 calc keys -->
  <rect x="7" y="18" width="9" height="9" rx="1.5" fill="#F59E0B" opacity="0.95"/>
  <rect x="19.5" y="18" width="9" height="9" rx="1.5" fill="#F59E0B" opacity="0.8"/>
  <rect x="32" y="18" width="9" height="9" rx="1.5" fill="#F59E0B" opacity="0.95"/>
  <rect x="7" y="30" width="9" height="9" rx="1.5" fill="#D97706"/>
  <rect x="19.5" y="30" width="9" height="9" rx="1.5" fill="#D97706"/>
  <rect x="32" y="30" width="9" height="9" rx="1.5" fill="#EA580C"/>
  <line x1="7" y1="45" x2="41" y2="45" stroke="#FAFAF9" stroke-width="0.9" opacity="0.5"/>

  <!-- Wordmark — "Open" in dark, "Calculator Studio" in amber -->
  <text x="60" y="40" font-family="Space Grotesk, system-ui, sans-serif" font-size="22" font-weight="700" letter-spacing="-0.02em">
    <tspan fill="#36363E">Open </tspan><tspan fill="#D97706">Calculations</tspan> <tspan fill="#36363E">Studio</tspan>
  </text>
  <text x="60" y="56" font-family="JetBrains Mono, monospace" font-size="9" fill="#A1A1AA" letter-spacing="0.12em" text-transform="uppercase">CALCPAD · EUROCODE · IFC</text>

  <defs>
    <linearGradient id="wmGrad" x1="0" x2="1">
      <stop offset="0%" stop-color="#D97706"/>
      <stop offset="50%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#EA580C"/>
    </linearGradient>
  </defs>
</svg>
