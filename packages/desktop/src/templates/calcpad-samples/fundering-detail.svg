<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 240" width="100%" style="max-height:320px; font-family:system-ui, sans-serif; font-size:11px;">
  <defs>
    <pattern id="hatch" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#888" stroke-width="0.6"/>
    </pattern>
  </defs>

  <!-- Grond (gevulde polygon) -->
  <polygon points="10,200 310,200 310,230 10,230" fill="url(#hatch)" stroke="#444" stroke-width="0.8"/>
  <line x1="10" y1="200" x2="310" y2="200" stroke="#444" stroke-width="1.5"/>

  <!-- Fundering plaat (gevulde rect met arcering) -->
  <rect x="60" y="160" width="200" height="40" fill="#D6D3D1" stroke="#1F2937" stroke-width="1.2"/>
  <rect x="60" y="160" width="200" height="40" fill="url(#hatch)" opacity="0.4"/>

  <!-- Muur / kolom op fundering (gevulde polygon) -->
  <polygon points="150,40 170,40 170,160 150,160" fill="#9CA3AF" stroke="#1F2937" stroke-width="1.2"/>

  <!-- Pijl belasting NEd -->
  <polygon points="160,10 154,28 158,28 158,40 162,40 162,28 166,28" fill="#DC2626" stroke="#7F1D1D" stroke-width="0.6"/>
  <text x="175" y="22" fill="#DC2626" font-weight="700">N_Ed</text>

  <!-- Maatlijn breedte -->
  <line x1="60" y1="215" x2="260" y2="215" stroke="#92400E" stroke-width="0.8"/>
  <line x1="60" y1="210" x2="60" y2="220" stroke="#92400E" stroke-width="0.8"/>
  <line x1="260" y1="210" x2="260" y2="220" stroke="#92400E" stroke-width="0.8"/>
  <text x="160" y="228" text-anchor="middle" fill="#92400E" font-weight="600">b_fdn</text>

  <!-- Hoogte aanduiding -->
  <line x1="270" y1="160" x2="270" y2="200" stroke="#92400E" stroke-width="0.8"/>
  <line x1="265" y1="160" x2="275" y2="160" stroke="#92400E" stroke-width="0.8"/>
  <line x1="265" y1="200" x2="275" y2="200" stroke="#92400E" stroke-width="0.8"/>
  <text x="278" y="183" fill="#92400E" font-weight="600">t_fdn</text>

  <!-- Onderkant fundering label -->
  <circle cx="60" cy="200" r="2.5" fill="#1F2937"/>
  <text x="14" y="195" fill="#1F2937">OK fundering</text>

  <!-- Maatvoering polygon (geometrische marker, ook gevuld) -->
  <polygon points="20,20 35,20 27.5,32" fill="#0891B2" stroke="#0E7490" stroke-width="0.5"/>
  <text x="40" y="29" fill="#0891B2" font-weight="600">Detail D1</text>
</svg>
